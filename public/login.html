<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Portfolio CMS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-panel {
      width: 100%;
      max-width: 420px;
      padding: 3rem 2.5rem;
    }
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-header i {
      font-size: 3rem;
      color: var(--accent-primary);
      margin-bottom: 1rem;
    }
    .login-header h1 {
      font-family: var(--font-title);
      font-size: 1.8rem;
      font-weight: 700;
    }
    .login-header p {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }
    .btn-block {
      width: 100%;
      margin-top: 1rem;
    }
    .back-home {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .back-home:hover {
      color: var(--accent-primary);
    }
  </style>
</head>
<body>

  <!-- Background Interactive Canvas & Glows -->
  <canvas id="circuit-canvas"></canvas>
  <div class="ambient-glow glow-1"></div>

  <div class="login-container">
    <div class="glass-panel login-panel reveal revealed">
      <div class="login-header">
        <i class="fa-solid fa-lock"></i>
        <h1>Terminal Access</h1>
        <p>Authenticate to update portfolio metrics</p>
      </div>

      <form class="contact-form" id="login-form">
        <div class="form-group">
          <input type="email" id="email" class="form-input" placeholder=" " required>
          <label for="email" class="form-label">Admin Email</label>
        </div>

        <div class="form-group">
          <input type="password" id="password" class="form-input" placeholder=" " required>
          <label for="password" class="form-label">Password</label>
        </div>

        <div class="form-status" id="login-status" style="margin-bottom: 1rem;"></div>

        <button type="submit" class="btn btn-primary btn-block" id="login-btn">
          <i class="fa-solid fa-right-to-bracket"></i> Authenticate
        </button>
      </form>

      <a href="/" class="back-home"><i class="fa-solid fa-chevron-left"></i> Return to Public Site</a>
    </div>
  </div>

  <!-- Re-use canvas-bg.js for background rendering -->
  <script type="module">
    import { initCircuitBackground } from './js/canvas-bg.js';
    document.addEventListener('DOMContentLoaded', () => {
      initCircuitBackground();
    });
  </script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
